<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="#" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reset.css">
    <title>Admin Page</title>
</head>
<body>

    <!-- List Elements and Fonts for the Sidebar -->

    <nav class="sidebar">
        <div class="listItems">
            <ul>
                <li class="icons">
                    <img src="./icons/view-dashboard.svg" alt="view-dashboard">
                    <h3 class="iconFonts">Dashboard</h3>
                </li>
                <li class="icons">
                    <img src="./icons/home.svg" alt="Home">
                    <h3 class="iconFonts">Home</h3>
                </li>
                <li class="icons">
                    <img src="./icons/card-account-details-outline.svg" alt="Profile">
                    <h3 class="iconFonts">Profile</h3>
                </li>
                <li class="icons">
                    <img src="./icons/message-reply.svg" alt="Messages">
                    <h3 class="iconFonts">Messagges</h3>
                </li>
                <li class="icons">
                    <img src="./icons/clock-time-three.svg" alt="History">
                    <h3 class="iconFonts">History</h3>
                </li>
                <li class="icons">
                    <img src="./icons/file-multiple.svg" alt="Tasks">
                    <h3 class="iconFonts">Tasks</h3>
                </li>
                <li class="icons">
                    <img src="./icons/account-group-outline.svg" alt="Communities">
                    <h3 class="iconFonts">Communities</h3>
                </li>
                <li class="icons">
                    <img src="./icons/cog.svg" alt="Settings">
                    <h3 class="iconFonts">Settings</h3>
                </li>
                <li class="icons">
                    <img src="./icons/help-box.svg" alt="Support">
                    <h3 class="iconFonts">Support</h3>
                </li>
                <li class="icons">
                    <img src="./icons/shield-check.svg" alt="Privacy">
                    <h3 class="iconFonts">Privacy</h3>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Elements and Fonts for the Header -->
     <nav class="header">
        <div class="headerTop">
          <div class="magnify">
            <img src="./icons/magnify.svg" alt="magnifying glass">
          </div>  
          <div class="searchBar">
            <input type="text" name="searchBar" id="searchBar">
          </div>
          <div class="adminLogo">
            <img src="https://github.com/DenisMichalski.png" alt="Admin Picture">
          </div>
          <div class="adminName">
            <h3>Denis Michalski</h3>
          </div>
        </div>
        <div class="headerBottom">
            <div class="adminLogo">
                <img src="https://github.com/DenisMichalski.png" alt="Admin Picture">
            </div>
            <div class="greetingtext">
                <h5>Hi there,</h5>
            </div>
            <div class="adminName">
                <h3>Denis Michalski (@denis)</h3>
            </div>
            <div class="btn">
                <button>New</button>
                <button>Upload</button>
                <button>Share</button>
            </div>
        </div>
     </nav>

     <!-- Main Content -->
      
</body>
</html>
